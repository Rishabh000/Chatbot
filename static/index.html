<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,.08);
    }

    @media (min-height: 700px) {
      .chat-container { height: 92vh; max-height: 860px; border-radius: 16px; }
    }

    .chat-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 20px 24px;
      border-radius: 16px 16px 0 0;
      flex-shrink: 0;
    }

    .chat-header h1 { font-size: 1.2rem; font-weight: 600; }
    .chat-header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.blocked {
      background: #fff3e0;
      color: #e65100;
      border: 1px solid #ffe0b2;
    }

    .message.welcome {
      align-self: center;
      background: transparent;
      color: #666;
      text-align: center;
      font-size: 0.85rem;
      max-width: 90%;
    }

    .message.assistant p { margin: 0 0 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { font-weight: 600; }
    .message.assistant ul, .message.assistant ol { margin: 4px 0 8px 18px; }
    .message.assistant code {
      background: #e2e6ea; padding: 1px 5px; border-radius: 4px; font-size: 0.85em;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: #f0f2f5;
      border-radius: 16px;
      display: none;
      gap: 4px;
    }

    .typing-indicator.visible { display: flex; }

    .typing-indicator span {
      width: 8px; height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 0 0 16px 16px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input input:focus { border-color: #1a73e8; }

    .chat-input button {
      padding: 12px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .chat-input button:hover { background: #1557b0; }
    .chat-input button:disabled { background: #94bef7; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>Real Estate Chatbot</h1>
    <p>Ask me anything about real estate</p>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message welcome">
      Welcome! I can help you with questions about buying &amp; selling property,
      mortgages, property management, real estate investment, zoning, housing
      markets, and more.
    </div>
  </div>

  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>

  <form class="chat-input" id="chatForm">
    <input type="text" id="questionInput" placeholder="Ask a real estate question…" autocomplete="off" />
    <button type="submit" id="sendBtn">Send</button>
  </form>
</div>

<script>
  const messagesEl  = document.getElementById("messages");
  const typingEl    = document.getElementById("typing");
  const form        = document.getElementById("chatForm");
  const input       = document.getElementById("questionInput");
  const sendBtn     = document.getElementById("sendBtn");

  let sessionId = null;

  async function initSession() {
    try {
      const res  = await fetch("/session/new", { method: "POST" });
      const data = await res.json();
      sessionId  = data.session_id;
    } catch {
      sessionId = crypto.randomUUID();
    }
  }

  function addMessage(text, role, blocked = false) {
    const div = document.createElement("div");
    div.className = "message " + role + (blocked ? " blocked" : "");
    if (role === "assistant" && !blocked && typeof marked !== "undefined") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(on) {
    typingEl.classList.toggle("visible", on);
    sendBtn.disabled = on;
    if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";
    setLoading(true);

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, question }),
      });

      if (res.status === 429) {
        addMessage("Too many requests. Please wait a moment and try again.", "assistant", true);
        return;
      }

      const data = await res.json();
      addMessage(data.answer, "assistant", data.was_blocked);
    } catch {
      addMessage("Something went wrong. Please try again.", "assistant", true);
    } finally {
      setLoading(false);
    }
  });

  initSession();
</script>
</body>
</html>
